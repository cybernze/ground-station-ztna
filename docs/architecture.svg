<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 680" width="520" height="680" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="520" height="680" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="260" y="38" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700" letter-spacing="0.5">Ground Station ZTNA — Architecture</text>

  <!-- ── Internet ── -->
  <rect x="170" y="60" width="180" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="260" y="82" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">Internet</text>
  <text x="260" y="100" text-anchor="middle" fill="#8b949e" font-size="11">Untrusted client</text>

  <!-- Arrow -->
  <line x1="260" y1="112" x2="260" y2="138" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── AWS Security Group ── -->
  <rect x="100" y="138" width="320" height="64" rx="8" fill="#161b22" stroke="#f78166" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="260" y="160" text-anchor="middle" fill="#f78166" font-size="11" font-weight="600">AWS SECURITY GROUP</text>
  <text x="260" y="178" text-anchor="middle" fill="#8b949e" font-size="11">IP allowlist · port 8443, 22 only</text>
  <text x="260" y="193" text-anchor="middle" fill="#8b949e" font-size="10">Blocks all other traffic</text>

  <!-- Arrow -->
  <line x1="260" y1="202" x2="260" y2="228" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── EC2 box (outer) ── -->
  <rect x="60" y="228" width="400" height="330" rx="10" fill="#0d1117" stroke="#388bfd" stroke-width="1.5"/>
  <text x="110" y="248" fill="#388bfd" font-size="10" font-weight="600">EC2 — eu-south-2</text>

  <!-- ── Nginx ── -->
  <rect x="120" y="258" width="280" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="260" y="281" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">Nginx  :8443</text>
  <text x="260" y="299" text-anchor="middle" fill="#e6edf3" font-size="11">mTLS enforced</text>
  <text x="260" y="316" text-anchor="middle" fill="#8b949e" font-size="10">Client cert required · signed by private CA</text>
  <text x="260" y="330" text-anchor="middle" fill="#f78166" font-size="10">✕  No cert → SSL handshake failure</text>

  <!-- Arrow -->
  <line x1="260" y1="338" x2="260" y2="368" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── FastAPI ── -->
  <rect x="120" y="368" width="280" height="90" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="260" y="391" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="600">FastAPI  :8000  (internal)</text>
  <text x="260" y="409" text-anchor="middle" fill="#e6edf3" font-size="11">Never exposed to internet</text>
  <text x="175" y="430" fill="#8b949e" font-size="11">POST  /telemetry</text>
  <text x="175" y="447" fill="#8b949e" font-size="11">POST  /command</text>
  <text x="345" y="430" fill="#8b949e" font-size="11" text-anchor="end">GET  /health</text>

  <!-- Arrow -->
  <line x1="260" y1="458" x2="260" y2="490" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Docker Compose ── -->
  <rect x="120" y="490" width="280" height="52" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="260" y="513" text-anchor="middle" fill="#e3b341" font-size="13" font-weight="600">Docker Compose</text>
  <text x="260" y="531" text-anchor="middle" fill="#8b949e" font-size="11">Non-root container · isolated bridge network</text>

  <!-- ── Private CA note ── -->
  <rect x="60" y="580" width="400" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="260" y="598" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Private CA (OpenSSL)  ·  Terraform IaC  ·  Zero-Trust</text>
  <text x="260" y="613" text-anchor="middle" fill="#8b949e" font-size="10">Every connection requires cryptographic identity proof</text>

  <!-- ── Terraform badge ── -->
  <rect x="60" y="635" width="120" height="26" rx="6" fill="#1a1f2e" stroke="#388bfd" stroke-width="1"/>
  <text x="120" y="652" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="600">Terraform IaC</text>

  <rect x="200" y="635" width="120" height="26" rx="6" fill="#1a1f2e" stroke="#3fb950" stroke-width="1"/>
  <text x="260" y="652" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">mTLS / X.509</text>

  <rect x="340" y="635" width="120" height="26" rx="6" fill="#1a1f2e" stroke="#d2a8ff" stroke-width="1"/>
  <text x="400" y="652" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="600">FastAPI · Docker</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
  </defs>
</svg>
