events {
    worker_connections 1024;
}

http {

    # ── Logging detallado — incluye info del certificado cliente ──────────────
    log_format mtls_log '$remote_addr - "$ssl_client_s_dn" [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        'ssl_verify=$ssl_client_verify';

    access_log /var/log/nginx/access.log mtls_log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 8443 ssl;

        # ── Certificado del SERVIDOR ──────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ── CA que firmó los certificados de CLIENTES aceptados ───────────────
        ssl_client_certificate /etc/nginx/certs/ca.crt;

        # ── NÚCLEO mTLS: exigir certificado cliente ───────────────────────────
        # "on" = rechaza conexión si cliente no presenta certificado válido
        ssl_verify_client on;

        # ── Protocolos y cifrados seguros (TLS 1.2 mínimo) ───────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── Proxy hacia la API Python ─────────────────────────────────────────
        location / {
            proxy_pass         http://gs-api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # Pasa info del certificado cliente a la API (para auditoría futura)
            proxy_set_header   X-Client-CN $ssl_client_s_dn;
            proxy_set_header   X-SSL-Verify $ssl_client_verify;
        }
    }
}
